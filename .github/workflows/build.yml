name: Build MythicLib

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build plugin jar
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show build environment
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn -B -ntp -pl mythiclib-plugin test

      # This mirrors server_install.bat. A full `mvn clean package` attempts to
      # build every NMS wrapper module and may require locally generated Spigot
      # BuildTools artifacts for older Minecraft versions.
      - name: Build deployable MythicLib jar
        run: |
          mvn -B -ntp clean install \
            -DskipTests \
            -pl mythiclib-plugin,mythiclib-rpg,mythiclib-v1_21_r7,mythiclib-dist

      - name: Collect MythicLib jar
        run: |
          mkdir -p artifacts

          jar_path=""
          if [ -d target ]; then
            jar_path="$(find target -maxdepth 1 -type f -name 'MythicLib-*.jar' | sort | head -n 1)"
          fi

          if [ -z "$jar_path" ] && [ -d mythiclib-dist/target ]; then
            jar_path="$(find mythiclib-dist/target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n 1)"
          fi

          if [ -z "$jar_path" ]; then
            echo "No MythicLib jar was found. Built jars:"
            find . -path '*/target/*.jar' -type f -print || true
            exit 1
          fi

          echo "Found jar: $jar_path"
          cp "$jar_path" artifacts/
          ls -lh artifacts/

      - name: Upload MythicLib jar
        uses: actions/upload-artifact@v4
        with:
          name: MythicLib-jar
          path: artifacts/*.jar
          if-no-files-found: error
          retention-days: 14
